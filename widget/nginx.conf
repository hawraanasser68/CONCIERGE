# Owner D — nginx config for the widget container.
# Listens on 3000 to match docker-compose port mapping.
# /widget.js is aliased to /loader.js so the source file keeps its spec name
# while host pages embed the canonical /widget.js URL.
# Cache-Control: no-cache on /widget.js so updates to the loader propagate immediately;
# long-lived cache on /assets/* because Vite content-hashes those filenames.

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;

    # Use Docker's embedded DNS so proxy_pass resolves "backend" at request-time,
    # not at nginx startup (which races the backend container coming up).
    resolver 127.0.0.11 valid=10s;

    location = /widget.js {
        try_files /loader.js =404;
        add_header Cache-Control "no-cache" always;
    }

    # Proxy backend API calls through the widget origin so the loader.js
    # fetch(widgetServer + "/api/v1/widget/token") reaches the backend
    # container on the docker network. Without this the POST 404s at nginx.
    location /api/ {
        # Variable forces nginx to defer DNS to request-time using the resolver
        # declared above, instead of failing at startup if backend isn't ready.
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
    }

    # Root path serves the Bloom Florista mock host page so visiting
    # http://localhost:3000/ shows a realistic florist site with the widget
    # embedded, rather than the raw iframe shell. The iframe app is still
    # reachable at /iframe.html below.
    location = / {
        try_files /florist.html =404;
    }

    # /iframe.html is the URL the loader injects; we serve the same React app
    # that lives at /index.html. Keeping the URL distinct makes the embed
    # contract explicit ("iframe entrypoint") while reusing the built shell.
    location = /iframe.html {
        try_files /index.html =404;
    }

    location ~ ^/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        try_files $uri /index.html;
    }
}
