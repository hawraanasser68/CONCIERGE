# Owner A — owns this file entirely. No other owner edits docker-compose.yml.
# All services have healthchecks so depends_on: condition: service_healthy works correctly.
# Every docker compose call in CI must set COMPOSE_PROJECT_NAME=ci-${{ github.run_id }}
# to isolate concurrent runs on the same runner.

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: concierge
      POSTGRES_USER: concierge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concierge -d concierge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      # Dev mode: auto-unsealed, root token = "root", no TLS. Dev only.
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./vault:/vault-config:ro
    entrypoint: ["sh", "/vault-config/init.sh"]
    # Runs once and exits — not a long-running service

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"   # OTLP gRPC — backend sends traces here
      - "16686:16686" # Jaeger UI
    healthcheck:
      # Port 14269 is the admin/health port
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application Services ──────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://concierge:${POSTGRES_PASSWORD}@db:5432/concierge
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      # python:3.11-slim ships no curl/wget, so probe with stdlib urllib.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 15

  modelserver:
    build:
      context: ./modelserver
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    ports:
      - "8001:8001"
    depends_on:
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 15

  guardrails:
    build:
      context: ./guardrails
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      BACKEND_URL: http://backend:8000
    ports:
      - "8002:8002"
    depends_on:
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8002/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 15

  admin:
    build:
      context: ./admin
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8501/').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 10

  widget:
    build:
      context: ./widget
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/widget.js"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  minio_data:
