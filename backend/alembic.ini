# Owner A — backend/alembic.ini
# Alembic configuration file.
# sqlalchemy.url is intentionally left blank — it is set at runtime in env.py
# by reading the DATABASE_URL environment variable. Never hardcode credentials here.

[alembic]
script_location = migrations
prepend_sys_path = .

# Blank — overridden in migrations/env.py from DATABASE_URL env var
sqlalchemy.url =

# Migration file naming: timestamp + descriptive slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
