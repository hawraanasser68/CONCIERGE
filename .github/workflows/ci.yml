# Owner D — main CI pipeline.
# Job DAG: lint-and-typecheck → build-images → smoke-test → 5 parallel eval gates.
# COMPOSE_PROJECT_NAME=ci-${{ github.run_id }} is set on every docker compose call
# so concurrent CI runs on the same runner don't collide on container names or ports.
# Eval scripts arrive in Phase 5 (D-024..D-028); until they land, the eval jobs no-op
# but the DAG is wired so CI stays green from Day 1.

name: ci

on:
  push:
  pull_request:

env:
  COMPOSE_PROJECT_NAME: ci-${{ github.run_id }}

jobs:

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install backend deps (uv sync --dev)
        working-directory: backend
        run: uv sync --dev

      - name: Install lint tooling
        run: pip install ruff mypy

      - name: Ruff
        # backend/migrations is autogenerated; long INSERT lines are expected
        run: ruff check backend/ admin/ modelserver/ guardrails/ --exclude backend/migrations

      - name: Mypy (backend)
        run: mypy --config-file backend/pyproject.toml backend/app/

      - name: Pytest (backend integration tests; DB/Vault stubbed via dependency_overrides)
        working-directory: backend
        env:
          # Settings(extra="forbid") requires DATABASE_URL even though tests stub
          # the DB out. The URL is never connected to in unit/integration tests.
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: uv run pytest tests

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: widget/pnpm-lock.yaml

      - name: Widget tsc (fast path; strict check is in widget.yml)
        working-directory: widget
        run: |
          pnpm install --frozen-lockfile
          pnpm tsc --noEmit

  build-images:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build all images
        run: docker compose build --parallel

      - name: Check modelserver image size (<530MB)
        run: |
          IMAGE="${COMPOSE_PROJECT_NAME}-modelserver"
          SIZE=$(docker image inspect "$IMAGE" --format='{{.Size}}')
          echo "modelserver image size: ${SIZE} bytes"
          if [ "$SIZE" -gt 530000000 ]; then
            echo "ERROR: modelserver image exceeds 530MB"
            exit 1
          fi

  smoke-test:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 180

      - name: Health checks (backend, modelserver, guardrails, widget)
        run: |
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8001/health
          curl -fsS http://localhost:8002/health
          curl -fsS http://localhost:3000/widget.js

      - name: Migration applied (alembic at head)
        run: docker compose exec -T backend alembic current | grep "(head)"

      - name: Two seeded tenants exist
        run: |
          docker compose exec -T db \
            psql -U concierge -d concierge -tAc "SELECT count(*) FROM tenants;" | grep -E "^2$"

      - name: Teardown
        if: always()
        run: docker compose down -v

  eval-classifier:
    needs: smoke-test
    runs-on: ubuntu-latest
    env:
      MODELSERVER_URL: http://localhost:8001
    steps:
      - uses: actions/checkout@v4
      - name: Install runner Python deps
        run: pip install httpx pyyaml
      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 180
      - name: Read modelserver token from Vault
        run: |
          TOKEN=$(docker compose exec -T -e VAULT_ADDR=http://vault:8200 -e VAULT_TOKEN=root vault \
            vault kv get -field=token secret/svc/modelserver | tr -d '[:space:]')
          if [ -z "$TOKEN" ]; then echo "ERROR: modelserver token empty"; exit 1; fi
          echo "MODELSERVER_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run classifier eval (live; macro_f1 gate)
        run: python backend/evals/classifier/run.py --live
      - name: Teardown
        if: always()
        run: docker compose down -v

  eval-agent:
    needs: smoke-test
    runs-on: ubuntu-latest
    env:
      CONCIERGE_BASE_URL: http://localhost:8000
      MODELSERVER_URL: http://localhost:8001
      DATABASE_URL: postgresql+asyncpg://concierge:changeme@localhost:5432/concierge
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install runner Python deps
        run: pip install httpx pyyaml asyncpg
      - name: Start stack + seed widgets
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 180
          docker compose exec -T -w /app backend python -m scripts.seed_dev_data
      - name: Push embed API key to Vault and reload modelserver
        run: |
          docker compose exec -T -e VAULT_ADDR=http://vault:8200 -e VAULT_TOKEN=root vault \
            vault kv put secret/embed/api_key key="$OPENAI_API_KEY"
          docker compose restart modelserver
          sleep 15
      - name: Read modelserver token from Vault
        run: |
          TOKEN=$(docker compose exec -T -e VAULT_ADDR=http://vault:8200 -e VAULT_TOKEN=root vault \
            vault kv get -field=token secret/svc/modelserver | tr -d '[:space:]')
          if [ -z "$TOKEN" ]; then echo "ERROR: modelserver token empty"; exit 1; fi
          echo "MODELSERVER_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Seed RAG content (CMS pages + chunks)
        run: |
          docker compose exec -T \
            -e MODELSERVER_TOKEN="$MODELSERVER_TOKEN" \
            -w /app backend \
            python evals/rag/seed.py
      - name: Generate widget token (Tenant A)
        run: |
          WIDGET_ID=$(docker compose exec -T db psql -U concierge -d concierge -tAc \
            "SELECT id FROM widgets WHERE tenant_id = 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa' LIMIT 1;" | tr -d '[:space:]')
          if [ -z "$WIDGET_ID" ]; then echo "ERROR: no widget seeded for Tenant A"; exit 1; fi
          TOKEN=$(curl -fsS -X POST "$CONCIERGE_BASE_URL/api/v1/widget/token" \
            -H "Content-Type: application/json" \
            -d "{\"widget_id\":\"$WIDGET_ID\",\"origin\":\"http://localhost:3000\"}" \
            | python -c "import sys,json;print(json.load(sys.stdin)['token'])")
          echo "WIDGET_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run agent tool-selection eval (live; tool_accuracy gate)
        run: python backend/evals/agent_tool_selection/run.py --live
      - name: Teardown
        if: always()
        run: docker compose down -v

  eval-rag:
    needs: smoke-test
    runs-on: ubuntu-latest
    env:
      CONCIERGE_BASE_URL: http://localhost:8000
      MODELSERVER_URL: http://localhost:8001
      DATABASE_URL: postgresql+asyncpg://concierge:changeme@localhost:5432/concierge
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install runner Python deps
        run: pip install httpx pyyaml asyncpg
      - name: Start stack + seed widgets
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 180
          docker compose exec -T -w /app backend python -m scripts.seed_dev_data
      - name: Push embed API key to Vault and reload modelserver
        run: |
          docker compose exec -T -e VAULT_ADDR=http://vault:8200 -e VAULT_TOKEN=root vault \
            vault kv put secret/embed/api_key key="$OPENAI_API_KEY"
          docker compose restart modelserver
          sleep 15
      - name: Generate widget token (Tenant A)
        run: |
          WIDGET_ID=$(docker compose exec -T db psql -U concierge -d concierge -tAc \
            "SELECT id FROM widgets WHERE tenant_id = 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa' LIMIT 1;" | tr -d '[:space:]')
          if [ -z "$WIDGET_ID" ]; then echo "ERROR: no widget seeded for Tenant A"; exit 1; fi
          TOKEN=$(curl -fsS -X POST "$CONCIERGE_BASE_URL/api/v1/widget/token" \
            -H "Content-Type: application/json" \
            -d "{\"widget_id\":\"$WIDGET_ID\",\"origin\":\"http://localhost:3000\"}" \
            | python -c "import sys,json;print(json.load(sys.stdin)['token'])")
          echo "WIDGET_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Read modelserver token from Vault
        run: |
          TOKEN=$(docker compose exec -T -e VAULT_ADDR=http://vault:8200 -e VAULT_TOKEN=root vault \
            vault kv get -field=token secret/svc/modelserver | tr -d '[:space:]')
          if [ -z "$TOKEN" ]; then echo "ERROR: modelserver token empty"; exit 1; fi
          echo "MODELSERVER_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Seed RAG content (CMS pages + chunks)
        run: |
          docker compose exec -T \
            -e MODELSERVER_TOKEN="$MODELSERVER_TOKEN" \
            -w /app backend \
            python evals/rag/seed.py
      - name: Run RAG eval (live; hit_at_5 + faithfulness + answer_relevancy)
        run: python backend/evals/rag/run.py --all
      - name: Teardown
        if: always()
        run: docker compose down -v

  eval-redteam:
    needs: smoke-test
    runs-on: ubuntu-latest
    env:
      CONCIERGE_BASE_URL: http://localhost:8000
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install runner Python deps
        run: pip install httpx pyyaml
      - name: Start stack + seed widgets
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 180
          docker compose exec -T -w /app backend python -m scripts.seed_dev_data
      - name: Generate widget token (Tenant A)
        run: |
          WIDGET_ID=$(docker compose exec -T db psql -U concierge -d concierge -tAc \
            "SELECT id FROM widgets WHERE tenant_id = 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa' LIMIT 1;" | tr -d '[:space:]')
          if [ -z "$WIDGET_ID" ]; then echo "ERROR: no widget seeded for Tenant A"; exit 1; fi
          TOKEN=$(curl -fsS -X POST "$CONCIERGE_BASE_URL/api/v1/widget/token" \
            -H "Content-Type: application/json" \
            -d "{\"widget_id\":\"$WIDGET_ID\",\"origin\":\"http://localhost:3000\"}" \
            | python -c "import sys,json;print(json.load(sys.stdin)['token'])")
          echo "WIDGET_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run red-team HTTP runner (block_rate=1.0 LOCKED)
        run: python backend/evals/redteam/http_run.py --live
      - name: Teardown
        if: always()
        run: docker compose down -v

  eval-redaction:
    needs: smoke-test
    runs-on: ubuntu-latest
    env:
      CONCIERGE_BASE_URL: http://localhost:8000
      REDIS_URL: redis://localhost:6379
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install runner Python deps
        run: pip install httpx pyyaml
      - name: Start stack + seed widgets
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 180
          docker compose exec -T -w /app backend python -m scripts.seed_dev_data
      - name: Generate widget token (Tenant A)
        run: |
          WIDGET_ID=$(docker compose exec -T db psql -U concierge -d concierge -tAc \
            "SELECT id FROM widgets WHERE tenant_id = 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa' LIMIT 1;" | tr -d '[:space:]')
          if [ -z "$WIDGET_ID" ]; then echo "ERROR: no widget seeded for Tenant A"; exit 1; fi
          TOKEN=$(curl -fsS -X POST "$CONCIERGE_BASE_URL/api/v1/widget/token" \
            -H "Content-Type: application/json" \
            -d "{\"widget_id\":\"$WIDGET_ID\",\"origin\":\"http://localhost:3000\"}" \
            | python -c "import sys,json;print(json.load(sys.stdin)['token'])")
          echo "WIDGET_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run redaction HTTP runner (leak_rate=0.0 LOCKED)
        run: python backend/evals/redaction/http_run.py --live
      - name: Teardown
        if: always()
        run: docker compose down -v
